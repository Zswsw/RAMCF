seed: 42
data_dir: "data"

val_ratio: 0.1
test_ratio: 0.1

epochs: 250
batch_size: 512
learning_rate: 4.0e-4
weight_decay: 8.0e-3
warmup_ratio: 0.05
patience: 40
num_workers: 4

use_ema: true
ema_decay: 0.9995
use_swa: true
swa_start_epoch: 150

model:
  embed_dim: 256
  num_heads: 8
  num_cross_layers: 3
  num_fusion_layers: 2
  dropout: 0.25
  temperature: 0.07
  contrastive_weight: 0.03
  contrastive_margin: 0.15
  hard_neg_ratio: 0.5
  ordinal_weight: 0.15
  drug_modal_dim: 256
  hlgt_dim: 105
  soc_dim: 26
  semantic_dim: 300
  num_drugs: 638
  num_se: 994
  num_levels: 5
  huber_delta: 0.1

save_dir: "checkpoints"
